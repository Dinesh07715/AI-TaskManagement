spring.application.name=taskmanager

# Server
server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/task_management_portal}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Dinesh@1511}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:7a4b9c2d8e1f3a6b0c5d9e2f4a7b1c3d6e0f2a5b8c1d4e7f0a3b6c9d2e5f8a1b}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Gemini AI
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.taskmanager=INFO
logging.level.org.springframework.security=WARN